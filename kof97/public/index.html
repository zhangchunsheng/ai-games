<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOF 97 - Fighting Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    #controls-help {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
    }
    #controls-help h3 {
      color: #ff0;
      margin-bottom: 5px;
    }
    #controls-help p {
      margin: 3px 0;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="controls-help">
    <h3>Controls</h3>
    <p>Move: Arrow Keys / WASD | LP: Z | MP: X | HP: C | LK: , | MK: . | HK: /</p>
  </div>

  <script type="module">
    // This is a placeholder for the standalone HTML build
    // The actual game would be bundled with webpack/metro
    console.log('KOF 97 - Standalone HTML mode');
    console.log('For full game, run: npx expo start --web');
  </script>
</body>
</html>
